name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Checkout xezim-core
        run: git clone https://github.com/aionhw/xezim-core.git ../xezim-core

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: cargo test (no features)
        run: cargo test

      - name: cargo test --features jit
        run: cargo test --features jit

      - name: Install LLVM 18
        run: sudo apt-get install -y llvm-18-dev

      - name: cargo test --features jit-llvm
        run: cargo test --features jit-llvm
